name: Integration Prompts Auth Tests

run-name: Run prompts tenant isolation tests with Kubernetes authentication

on:
  push:
    branches:
      - main
      - 'release-[0-9]+.[0-9]+.x'
  pull_request:
    branches:
      - main
      - 'release-[0-9]+.[0-9]+.x'
    paths:
      - 'distributions/**'
      - 'src/ogx/**'
      - '!src/ogx_ui/**'
      - 'tests/integration/**'
      - 'uv.lock'
      - 'pyproject.toml'
      - 'requirements.txt'
      - '.github/workflows/integration-prompts-auth-tests.yml'
  merge_group:
    branches:
      - main
      - 'release-[0-9]+.[0-9]+.x'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref == 'refs/heads/main' && github.run_id || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-prompts-access-control:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install dependencies
        uses: ./.github/actions/setup-runner

      - name: Start minikube
        run: |
          minikube start
          kubectl get pods -A

      - name: Configure Kube Auth
        run: |
          kubectl create namespace ogx
          for account in ogx-auth ogx-user1 ogx-user2; do
            kubectl create serviceaccount $account -n ogx
            kubectl create token $account -n ogx --duration=1h > $account-token
          done

      - name: Set Kubernetes Config
        run: |
          {
            echo "KUBERNETES_API_SERVER_URL=$(kubectl get --raw /.well-known/openid-configuration| jq -r .jwks_uri)"
            echo "KUBERNETES_CA_CERT_PATH=$(kubectl config view --minify -o jsonpath='{.clusters[0].cluster.certificate-authority}')"
            echo "KUBERNETES_ISSUER=$(kubectl get --raw /.well-known/openid-configuration| jq -r .issuer)"
            echo "KUBERNETES_AUDIENCE=$(kubectl create token ogx-auth -n ogx --duration=1h | cut -d. -f2 | base64 -d | jq -r '.aud[0]')"
            echo "TOKEN=$(cat ogx-auth-token)"
            echo "ALICE_TOKEN=$(cat ogx-user1-token)"
            echo "BOB_TOKEN=$(cat ogx-user2-token)"
          } >> "$GITHUB_ENV"

      - name: Configure and start OGX server
        run: |
          run_dir=$(mktemp -d)
          cat <<EOF > "$run_dir/config.yaml"
          version: '2'
          image_name: prompts-auth
          distro_name: prompts-auth
          apis:
            - inference
          providers:
            inference:
              - provider_id: stub
                provider_type: remote::openai
                config:
                  api_key: stub
          storage:
            backends:
              kv_default:
                type: kv_sqlite
                db_path: $run_dir/kvstore.db
              sql_default:
                type: sql_sqlite
                db_path: $run_dir/sql_store.db
            stores:
              metadata:
                namespace: registry
                backend: kv_default
              inference:
                table_name: inference_store
                backend: sql_default
              conversations:
                table_name: openai_conversations
                backend: sql_default
              prompts:
                table_name: prompts
                backend: sql_default
          server:
            port: 8321
            auth:
              access_policy:
                - permit:
                    actions: [read]
                    resource: model::*
                  description: Any authenticated user can use configured models
                - permit:
                    actions: [create]
                    resource: sql_record::prompts::*
                  description: Any authenticated user can create prompts
                - permit:
                    actions: [read, update, delete]
                    resource: sql_record::prompts::*
                  when:
                    - user is owner
                  description: Users can only access their own prompts
          EOF
          yq eval '.server.auth.provider_config.type = "oauth2_token"' -i "$run_dir/config.yaml"
          yq eval '.server.auth.provider_config.tls_cafile = "${{ env.KUBERNETES_CA_CERT_PATH }}"' -i "$run_dir/config.yaml"
          yq eval '.server.auth.provider_config.issuer = "${{ env.KUBERNETES_ISSUER }}"' -i "$run_dir/config.yaml"
          yq eval '.server.auth.provider_config.audience = "${{ env.KUBERNETES_AUDIENCE }}"' -i "$run_dir/config.yaml"
          yq eval '.server.auth.provider_config.jwks.uri = "${{ env.KUBERNETES_API_SERVER_URL }}"' -i "$run_dir/config.yaml"
          yq eval '.server.auth.provider_config.jwks.token = "${{ env.TOKEN }}"' -i "$run_dir/config.yaml"
          cat "$run_dir/config.yaml"

          export OGX_LOG_WIDTH=200
          nohup uv run ogx stack run "$run_dir/config.yaml" > server.log 2>&1 &

      - name: Wait for OGX server to be ready
        run: |
          echo "Waiting for OGX server..."
          for _ in {1..30}; do
            if curl -s -L http://localhost:8321/v1/health | grep -q "OK"; then
              echo "OGX server is up!"
              if grep -q "Enabling authentication.*provider=oauth2_token" server.log; then
                echo "OGX server is configured with oauth2_token auth"
                exit 0
              else
                echo "OGX server auth not configured correctly"
                cat server.log
                exit 1
              fi
            fi
            sleep 1
          done
          echo "OGX server failed to start"
          cat server.log
          exit 1

      - name: Run prompts access control tests
        run: |
          uv run pytest tests/integration/responses/test_prompts_access_control.py \
            --stack-config http://localhost:8321 \
            -xvs --tb=short

      - name: Server log on failure
        if: failure()
        run: |
          echo "=== OGX server log (last 500 lines) ==="
          tail -500 server.log
