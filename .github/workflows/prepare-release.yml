# =============================================================================
# Pre-Release Preparation
# =============================================================================
#
# Triggered via workflow_dispatch to prepare a release branch for publishing.
# Takes a version (e.g., "0.5.1") and target release branch as input.
#
# Automates:
#   - Updating fallback_version to the release version in both pyproject.toml files
#   - Updating llama-stack-client pins to the release version
#   - Committing all changes directly to the release branch
#
# =============================================================================

name: Prepare release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., "0.5.1")'
        required: true
        type: string
      release_branch:
        description: 'Target release branch (e.g., "release-0.5.x")'
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare-release:
    name: Prepare release v${{ inputs.version }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.release_branch }}
          fetch-depth: 0

      - name: Validate inputs
        run: |
          VERSION="${{ inputs.version }}"
          BRANCH="${{ inputs.release_branch }}"

          # Validate version format (X.Y.Z)
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version format: ${VERSION}. Expected X.Y.Z (e.g., 0.5.1)"
            exit 1
          fi

          # Validate branch exists
          if ! git rev-parse "origin/${BRANCH}" >/dev/null 2>&1; then
            echo "::error::Branch ${BRANCH} does not exist"
            exit 1
          fi

          echo "Preparing release v${VERSION} on ${BRANCH}"

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Update version files and commit directly to release branch
        run: |
          VERSION="${{ inputs.version }}"
          RELEASE_BRANCH="${{ inputs.release_branch }}"

          # --- Update fallback_version in ALL workspace packages ---
          for f in packages/*/pyproject.toml; do
            if grep -q 'fallback_version' "$f"; then
              sed -i "s/^fallback_version = .*/fallback_version = \"${VERSION}\"/" "$f"
            fi
          done

          # --- Pin all internal workspace deps to ==${VERSION} ---
          python3 << 'PYEOF'
          import tomllib, pathlib, re, os

          version = os.environ["VERSION"]
          pyprojects = sorted(pathlib.Path("packages").glob("*/pyproject.toml"))

          # Collect all workspace package names, normalized to hyphens (PEP 503)
          internal = set()
          for f in pyprojects:
              name = tomllib.loads(f.read_text()).get("project", {}).get("name", "")
              if name:
                  internal.add(name.replace("_", "-"))

          # Build a single regex that matches any internal package in a dependency string
          escaped = "|".join(re.escape(pkg) for pkg in sorted(internal))
          dep_re = re.compile(rf'"({escaped})([><=!][^"]*)?(?=")')

          for f in pyprojects:
              text = f.read_text()
              new_lines = []
              for line in text.splitlines(keepends=True):
                  # Only touch indented lines (dependency arrays), skip top-level name = "..."
                  if line.startswith((" ", "\t")):
                      line = dep_re.sub(rf'"\1=={version}', line)
                  new_lines.append(line)
              result = "".join(new_lines)
              if result != text:
                  f.write_text(result)
          PYEOF

          # --- Update llama-stack-client pins ---
          sed -i -E "s/\"llama-stack-client[><=!]+[0-9]+\.[0-9]+\.[0-9]+[^\"]*\"/\"llama-stack-client==${VERSION}\"/" packages/llama-stack/pyproject.toml

          # Show what changed
          echo "=== Changes ==="
          git diff --stat

          # Check if there are changes
          if git diff --quiet; then
            echo "::warning::No changes detected. Version may already be set to ${VERSION}."
            exit 0
          fi

          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/*/pyproject.toml
          git commit -s -m "chore: prepare release v${VERSION}"
          git push origin "HEAD:${RELEASE_BRANCH}"
          echo "Committed version updates directly to ${RELEASE_BRANCH}"
