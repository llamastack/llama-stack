[tool.ruff]
line-length = 120
exclude = [
    "./.git",
    "./docs/*",
    "./build",
    "./venv",
    "*.pyi",
    ".pre-commit-config.yaml",
    "*.md",
    ".flake8",
    "benchmarking/k8s-benchmark/results",
]

[tool.ruff.lint]
select = [
    "UP",      # pyupgrade
    "B",       # flake8-bugbear
    "B9",      # flake8-bugbear subset
    "C",       # comprehensions
    "E",       # pycodestyle
    "F",       # Pyflakes
    "N",       # Naming
    "W",       # Warnings
    "DTZ",     # datetime rules
    "I",       # isort (imports order)
    "RUF001",  # Checks for ambiguous Unicode characters in strings
    "RUF002",  # Checks for ambiguous Unicode characters in docstrings
    "RUF003",  # Checks for ambiguous Unicode characters in comments
    "PLC2401", # Checks for the use of non-ASCII characters in variable names
    "PLC2403", # Checks for the use of non-ASCII characters in import statements
    "PLE2510", # Checks for strings that contain the control character BS.
    "PLE2512", # Checks for strings that contain the raw control character SUB.
    "PLE2513", # Checks for strings that contain the raw control character ESC.
    "PLE2514", # Checks for strings that contain the raw control character NUL (0 byte).
    "PLE2515", # Checks for strings that contain the zero width space character.
    "D101",    # Missing docstring in public class
]
ignore = [
    # The following ignores are desired by the project maintainers.
    "E402", # Module level import not at top of file
    "E501", # Line too long
    "F405", # Maybe undefined or defined from star import
    "C408", # Ignored because we like the dict keyword argument syntax
    "N812", # Ignored because import torch.nn.functional as F is PyTorch convention

    # These are the additional ones we started ignoring after moving to ruff. We should look into each one of them later.
    "C901", # Complexity of the function is too high
]
unfixable = [
    "PLE2515",
] # Do not fix this automatically since ruff will replace the zero-width space with \u200b - let's do it manually

[tool.ruff.lint.pydocstyle]
convention = "google"

# Ignore the following errors for the following files
# TODO: Fix in follow up PRs
[tool.ruff.lint.per-file-ignores]
"packages/llama-stack-api/src/llama_stack_api/apis/**/__init__.py" = ["F403"]
"tests/**/*.py" = ["DTZ", "D101"] # Ignore datetime and docstring rules for tests
"benchmarking/**/*.py" = ["D101"] # Ignore docstring rules for benchmarking scripts
"client-sdks/**/*.py" = ["D101"] # Ignore docstring rules for client SDKs
"scripts/**/*.py" = ["D101"] # Ignore docstring rules for scripts
"packages/llama-stack/src/llama_stack/providers/inline/scoring/basic/utils/ifeval_support.py" = [
    "RUF001",
]
"packages/llama-stack/src/llama_stack/providers/inline/scoring/basic/utils/ifeval_checkers_core.py" = [
    "RUF001",
]
"packages/llama-stack/src/llama_stack/providers/inline/scoring/basic/utils/ifeval_checkers_format.py" = [
    "RUF001",
]
"packages/llama-stack/src/llama_stack/providers/inline/scoring/basic/utils/ifeval_word_list.py" = [
    "RUF001",
]
"packages/llama-stack/src/llama_stack/providers/inline/scoring/basic/scoring_fn/fn_defs/regex_parser_multiple_choice_answer.py" = [
    "RUF001",
    "PLE2515",
]
"packages/llama-stack/src/llama_stack/apis/**/__init__.py" = [
    "F403",
] # Using import * is acceptable (or at least tolerated) in an __init__.py of a package API

[tool.mypy]
mypy_path = ["packages/llama-stack/src", "packages/llama-stack-api/src"]
packages = ["llama_stack", "llama_stack_api"]
plugins = ['pydantic.mypy']
disable_error_code = []
warn_return_any = true
# # honor excludes by not following there through imports
