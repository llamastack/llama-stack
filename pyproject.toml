[tool.uv]
required-version = ">=0.7.0"
constraint-dependencies = [
    "pyasn1>=0.6.3",  # CVE-2026-30922: DoS via unbounded recursion
    "tornado>=6.5.5",  # GHSA-qjxf-f2mg-c6mc
    "urllib3>=2.6.3",  # decompression-bomb safeguard bypass
]

[tool.uv.workspace]
members = [
    "packages/*",
]

[dependency-groups]
dev = [
    "pytest>=8.4",
    "pytest-timeout",
    "pytest-asyncio>=1.0",
    "pytest-cov",
    "pytest-html",
    "pytest-json-report",
    "pytest-socket",                 # For blocking network access in unit tests
    "nbval",                         # For notebook testing
    "black",
    "ruff",
    "mypy",
    "pre-commit>=4.4.0",
    "ruamel.yaml",                   # needed for openapi generator
    "openapi-spec-validator>=0.7.2",
    "tiktoken",                      # needed by responses provider tests
]
# Type checking dependencies - includes type stubs and optional runtime dependencies
# needed for complete mypy coverage across all optional features
type_checking = [
    "types-requests",
    "types-setuptools",
    "types-jsonschema",
    "pypdf>=6.7.2",
    "pandas-stubs",
    "types-psutil",
    "types-tqdm",
    "boto3-stubs[s3]",
    "chardet",
    "streamlit",
    "streamlit-option-menu",
    "pandas",
    "anthropic",
    "databricks-sdk",
    "fairscale",
    "torchtune",
    "trl",
    "peft",
    "datasets",
    "together",
    "nest-asyncio",
    "pymongo",
    "torchvision",
    "sqlite-vec",
    "faiss-cpu",
    "lm-format-enforcer",
    "mcp>=1.23.0",
    "ollama",
    "langchain-openai",
    "langchain-core",
    "langgraph",
    "llama-stack-client>=0.7.1",
]
# These are the dependencies required for running unit tests.
unit = [
    "anthropic",
    "databricks-sdk",
    "sqlite-vec",
    "ollama",
    "llama-stack-provider-inference-ollama",
    "aiosqlite",
    "aiohttp",
    "psycopg2-binary>=2.9.0",
    "pypdf>=6.7.2",
    "mcp>=1.23.0",
    "chardet",
    "sqlalchemy",
    "sqlalchemy[asyncio]>=2.0.41",
    "blobfile",
    "faiss-cpu",
    "litellm",
    "together",
    "coverage",
    "llama-stack-client>=0.7.1",
    "moto[s3]>=5.1.10",
    "qdrant-client",
    # Provider packages needed for unit tests
    "llama-stack-provider-safety-passthrough",
    "llama-stack-provider-files-localfs",
    "llama-stack-provider-files-s3",
    "llama-stack-provider-files-openai",
    "llama-stack-provider-responses-builtin",
    "llama-stack-provider-batches-reference",
]
# These are the core dependencies required for running integration tests. They are shared across all
# providers. If a provider requires additional dependencies, please add them to your environment
# separately. If you are using "uv" to execute your tests, you can use the "--group" flag to specify extra
# dependencies.
test = [
    "aiosqlite",
    "aiohttp",
    "torch>=2.6.0",
    "torchvision>=0.21.0",
    "chardet",
    "psycopg2-binary>=2.9.0",
    "pypdf>=6.7.2",
    "mcp>=1.23.0",
    "datasets>=4.0.0",
    "autoevals",
    "transformers",
    "sqlalchemy",
    "sqlalchemy[asyncio]>=2.0.41",
    "requests",
    "chromadb>=1.0.15",
    "qdrant-client",
    "pymilvus>=2.6.2",
    "milvus-lite>=2.5.0; platform_machine == 'x86_64' or platform_machine == 'aarch64' or platform_machine == 'arm64'",
    "weaviate-client>=4.16.4",
    "elasticsearch>=8.16.0, <9.0.0",
    "langchain-openai",
    "langchain-core",
    "langgraph",
    "google-genai>=1.69.0",
]
docs = [
    "setuptools",
    "sphinx-autobuild",
    "myst-parser",
    "sphinx",
    "sphinx-rtd-theme",
    "sphinx_rtd_dark_mode",
    "sphinx-copybutton",
    "sphinx-tabs",
    "sphinx-design",
    "sphinxcontrib.redoc",
    "sphinxcontrib.video",
    "sphinxcontrib.mermaid",
    "sphinx-reredirects",
    "tomli",
    "linkify",
    "sphinxcontrib.openapi",
    "requests",
]
codegen = ["rich", "pydantic>=2.11.9", "jinja2>=3.1.6"]
benchmark = ["locust>=2.39.1"]

