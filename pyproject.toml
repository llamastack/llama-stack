[[tool.mypy.overrides]]
# packages that lack typing annotations, do not have stubs, or are unavailable.
module = [
    "yaml",
    "fire",
    "redis.asyncio",
    "psycopg2",
    "psycopg2.extras",
    "psycopg2.extensions",
    "torchtune.*",
    "fairscale.*",
    "torchvision.*",
    "datasets",
    "nest_asyncio",
    "streamlit_option_menu",
    "lmformatenforcer.*",
    "google.genai.*",
    "docling.*",
    "docling_core.*",
]
ignore_missing_imports = true

[[tool.mypy.overrides]]
# Shim modules that use sys.modules aliasing for backward compatibility.
# mypy cannot follow sys.modules[__name__] = _canonical, so skip them entirely.
# TODO: remove when providers are extracted and shims are deleted.
module = [
    "llama_stack.providers.utils.inference.*",
    "llama_stack.providers.utils.memory.*",
    "llama_stack.providers.utils.vector_io.*",
    "llama_stack.providers.utils.bedrock.*",
    "llama_stack.providers.utils.common.*",
    "llama_stack.providers.utils.files.*",
    "llama_stack.providers.utils.tools.*",
    "llama_stack.providers.utils.responses.*",
    "llama_stack.providers.utils.safety",
    "llama_stack.providers.utils.forward_headers",
    "llama_stack.providers.utils.pagination",
    "llama_stack.providers.utils.scheduler",
]
follow_imports = "skip"

[tool.pydantic-mypy]
init_forbid_extra = true
init_typed = true
warn_required_dynamic_aliases = true

[tool.ruff.lint.pep8-naming]
classmethod-decorators = ["classmethod", "pydantic.field_validator"]

[tool.pytest.ini_options]
addopts = ["--durations=10"]
asyncio_mode = "auto"
markers = ["allow_network: Allow network access for specific unit tests"]
filterwarnings = "ignore::DeprecationWarning"
