[project]
name = "llama-stack-provider-files-localfs"
dynamic = ["version"]
description = "Local filesystem-based file storage provider for managing files and documents locally."
requires-python = ">=3.12"
license = "MIT"
dependencies = [
    "llama-stack",
    "llama-stack-api",
    "llama-stack-utils-common",
]

[project.entry-points."llama_stack.providers"]
"files.inline.localfs" = "llama_stack_provider_files_localfs.provider:get_provider_spec"

[tool.uv.sources]
llama-stack = { workspace = true }
llama-stack-api = { workspace = true }
llama-stack-utils-common = { workspace = true }

[build-system]
requires = ["setuptools>=61.0", "setuptools-scm>=8.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools_scm]
root = "../.."
fallback_version = "0.7.2.dev0"

[tool.setuptools.packages.find]
where = ["src"]
include = ["llama_stack_provider_files_localfs"]
