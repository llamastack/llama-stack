[build-system]
requires = ["setuptools>=61.0", "setuptools-scm>=8.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools_scm]
root = "../.."
fallback_version = "0.7.1.dev0"

[tool.uv.sources]
llama-stack = { workspace = true }
llama-stack-api = { workspace = true }
llama-stack-utils-inference = { workspace = true }

[project]
name = "llama-stack-provider-inference-databricks"
dynamic = ["version"]
description = "Databricks inference provider for running models on Databricks' unified analytics platform."
requires-python = ">=3.12"
license = "MIT"
dependencies = [
    "llama-stack",
    "llama-stack-api",
    "llama-stack-utils-inference",
    "databricks-sdk",
]

[project.entry-points."llama_stack.providers"]
"inference.remote.databricks" = "llama_stack_provider_inference_databricks.provider:get_provider_spec"

[tool.setuptools.packages.find]
where = ["src"]
include = ["llama_stack_provider_inference_databricks"]
