[project]
name = "llama-stack-provider-tool-runtime-bing-search"
dynamic = ["version"]
description = "Bing Search tool for web search capabilities using Microsoft's search engine."
requires-python = ">=3.12"
license = "MIT"
dependencies = [
    "llama-stack",
    "llama-stack-api",
    "requests",
]

[project.entry-points."llama_stack.providers"]
"tool_runtime.remote.bing-search" = "llama_stack_provider_tool_runtime_bing_search.provider:get_provider_spec"

[tool.uv.sources]
llama-stack = { workspace = true }
llama-stack-api = { workspace = true }

[build-system]
requires = ["setuptools>=61.0", "setuptools-scm>=8.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools_scm]
root = "../.."
fallback_version = "0.7.2.dev0"

[tool.setuptools.packages.find]
where = ["src"]
include = ["llama_stack_provider_tool_runtime_bing_search"]
