[project]
name = "llama-stack-utils-common"
dynamic = ["version"]
description = "Shared common utilities for Llama Stack providers"
requires-python = ">=3.12"
license = "MIT"
dependencies = [
    "llama-stack",
    "llama-stack-api",
    "fastapi>=0.115.0",
    "pydantic>=2.11.9",
    "httpx",
    "mcp>=1.23.0",
]

[tool.uv.sources]
llama-stack = { workspace = true }
llama-stack-api = { workspace = true }

[build-system]
requires = ["setuptools>=61.0", "setuptools-scm>=8.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools_scm]
root = "../.."
fallback_version = "0.7.2.dev0"

[tool.setuptools.packages.find]
where = ["src"]
include = ["llama_stack_utils_common"]
