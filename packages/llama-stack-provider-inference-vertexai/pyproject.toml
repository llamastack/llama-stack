[build-system]
requires = ["setuptools>=61.0", "setuptools-scm>=8.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools_scm]
root = "../.."
fallback_version = "0.7.1.dev0"

[tool.uv.sources]
llama-stack = { workspace = true }
llama-stack-api = { workspace = true }
llama-stack-utils-inference = { workspace = true }

[project]
name = "llama-stack-provider-inference-vertexai"
dynamic = ["version"]
description = "Google Vertex AI inference provider for accessing Gemini models through Google Cloud's Vertex AI platform."
requires-python = ">=3.12"
license = "MIT"
dependencies = [
    "llama-stack",
    "llama-stack-api",
    "llama-stack-utils-inference",
    "google-genai>=1.69.0",
]

[project.entry-points."llama_stack.providers"]
"inference.remote.vertexai" = "llama_stack_provider_inference_vertexai.provider:get_provider_spec"

[tool.setuptools.packages.find]
where = ["src"]
include = ["llama_stack_provider_inference_vertexai"]
