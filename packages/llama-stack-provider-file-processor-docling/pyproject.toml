[project]
name = "llama-stack-provider-file-processor-docling"
dynamic = ["version"]
description = "Docling file processor for layout-aware, structure-preserving document parsing."
requires-python = ">=3.12"
license = "MIT"
dependencies = [
    "llama-stack",
    "llama-stack-api",
    "llama-stack-utils-vector-io",
    "docling",
]

[project.entry-points."llama_stack.providers"]
"file_processors.inline.docling" = "llama_stack_provider_file_processor_docling.provider:get_provider_spec"

[tool.uv.sources]
llama-stack = { workspace = true }
llama-stack-api = { workspace = true }
llama-stack-utils-vector-io = { workspace = true }

[build-system]
requires = ["setuptools>=61.0", "setuptools-scm>=8.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools_scm]
root = "../.."
fallback_version = "0.7.2.dev0"

[tool.setuptools.packages.find]
where = ["src"]
include = ["llama_stack_provider_file_processor_docling"]
