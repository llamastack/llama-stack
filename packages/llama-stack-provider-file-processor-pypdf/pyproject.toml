[build-system]
requires = ["setuptools>=61.0", "setuptools-scm>=8.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools_scm]
root = "../.."
fallback_version = "0.7.1.dev0"

[tool.uv.sources]
llama-stack = { workspace = true }
llama-stack-api = { workspace = true }
llama-stack-utils-vector-io = { workspace = true }

[project]
name = "llama-stack-provider-file-processor-pypdf"
dynamic = ["version"]
description = "PyPDF-based file processor for extracting text content from documents."
requires-python = ">=3.12"
license = "MIT"
dependencies = [
    "llama-stack",
    "llama-stack-api",
    "llama-stack-utils-vector-io",
    "pypdf>=6.7.2",
]

[project.entry-points."llama_stack.providers"]
"file_processors.inline.pypdf" = "llama_stack_provider_file_processor_pypdf.provider:get_provider_spec"

[tool.setuptools.packages.find]
where = ["src"]
include = ["llama_stack_provider_file_processor_pypdf"]
