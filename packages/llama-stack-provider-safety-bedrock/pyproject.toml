[project]
name = "llama-stack-provider-safety-bedrock"
dynamic = ["version"]
description = "AWS Bedrock safety provider for content moderation using AWS's safety services."
requires-python = ">=3.12"
license = "MIT"
dependencies = [
    "llama-stack",
    "llama-stack-api",
    "llama-stack-utils-safety",
    "llama-stack-utils-bedrock",
]

[project.entry-points."llama_stack.providers"]
"safety.remote.bedrock" = "llama_stack_provider_safety_bedrock.provider:get_provider_spec"

[tool.uv.sources]
llama-stack = { workspace = true }
llama-stack-api = { workspace = true }
llama-stack-utils-safety = { workspace = true }
llama-stack-utils-bedrock = { workspace = true }

[build-system]
requires = ["setuptools>=61.0", "setuptools-scm>=8.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools_scm]
root = "../.."
fallback_version = "0.7.2.dev0"

[tool.setuptools.packages.find]
where = ["src"]
include = ["llama_stack_provider_safety_bedrock"]
