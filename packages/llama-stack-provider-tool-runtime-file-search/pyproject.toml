[build-system]
requires = ["setuptools>=61.0", "setuptools-scm>=8.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools_scm]
root = "../.."
fallback_version = "0.7.1.dev0"

[tool.uv.sources]
llama-stack = { workspace = true }
llama-stack-api = { workspace = true }
llama-stack-utils-inference = { workspace = true }
llama-stack-utils-common = { workspace = true }

[project]
name = "llama-stack-provider-tool-runtime-file-search"
dynamic = ["version"]
description = "File search tool runtime provider for Llama Stack"
requires-python = ">=3.12"
license = "MIT"
dependencies = [
    "llama-stack",
    "llama-stack-api",
    "llama-stack-utils-inference",
    "llama-stack-utils-common",
    "chardet",
    "pypdf>=6.10.0",
    "tqdm",
    "numpy",
    "scikit-learn",
    "scipy",
    "nltk>=3.9.4",
    "sentencepiece",
    "transformers",
    "httpx",
    "fastapi>=0.115.0",
    "pydantic>=2.11.9",
    "jinja2>=3.1.6",
]

[project.entry-points."llama_stack.providers"]
"tool_runtime.inline.file-search" = "llama_stack_provider_tool_runtime_file_search.provider:get_provider_spec"

[tool.setuptools.packages.find]
where = ["src"]
include = ["llama_stack_provider_tool_runtime_file_search"]
