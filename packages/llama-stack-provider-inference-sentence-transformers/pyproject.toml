[project]
name = "llama-stack-provider-inference-sentence-transformers"
dynamic = ["version"]
description = "Sentence Transformers inference provider for Llama Stack"
requires-python = ">=3.12"
license = "MIT"
dependencies = [
    "llama-stack",
    "llama-stack-api",
    "llama-stack-utils-inference",
    "torch",
    "torchvision",
    "torchao>=0.12.0",
    "sentence-transformers",
    "einops",
    "tokenizers",
    "safetensors",
]

[project.entry-points."llama_stack.providers"]
"inference.inline.sentence-transformers" = "llama_stack_provider_inference_sentence_transformers.provider:get_provider_spec"

[tool.uv.sources]
llama-stack = { workspace = true }
llama-stack-api = { workspace = true }
llama-stack-utils-inference = { workspace = true }

[build-system]
requires = ["setuptools>=61.0", "setuptools-scm>=8.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools_scm]
root = "../.."
fallback_version = "0.7.2.dev0"

[tool.setuptools.packages.find]
where = ["src"]
include = ["llama_stack_provider_inference_sentence_transformers"]
