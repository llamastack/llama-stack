[build-system]
requires = ["setuptools>=61.0", "setuptools-scm>=8.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools_scm]
root = "../.."
fallback_version = "0.7.1.dev0"

[tool.uv.sources]
llama-stack = { workspace = true }
llama-stack-api = { workspace = true }

[project]
name = "efenness-llama-stack-provider-inference-ollama"
dynamic = ["version"]
description = "Ollama inference provider for Llama Stack"
requires-python = ">=3.12"
license = "MIT"
dependencies = [
    "llama-stack",
    "llama-stack-api",
    "ollama",
    "aiohttp",
    "h11>=0.16.0",
]

[project.entry-points."llama_stack.providers"]
"inference.remote.ollama" = "llama_stack_provider_inference_ollama.provider:get_provider_spec"

[tool.setuptools.packages.find]
where = ["src"]
include = ["llama_stack_provider_inference_ollama"]
