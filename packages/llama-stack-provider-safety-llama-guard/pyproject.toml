[build-system]
requires = ["setuptools>=61.0", "setuptools-scm>=8.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools_scm]
root = "../.."
fallback_version = "0.7.1.dev0"

[tool.uv.sources]
llama-stack = { workspace = true }
llama-stack-api = { workspace = true }
llama-stack-utils-inference = { workspace = true }

[project]
name = "llama-stack-provider-safety-llama-guard"
dynamic = ["version"]
description = "Llama Guard safety provider for content moderation using Meta's Llama Guard model."
requires-python = ">=3.12"
license = "MIT"
dependencies = [
    "llama-stack",
    "llama-stack-api",
    "llama-stack-utils-inference",
]

[project.entry-points."llama_stack.providers"]
"safety.inline.llama-guard" = "llama_stack_provider_safety_llama_guard.provider:get_provider_spec"

[tool.setuptools.packages.find]
where = ["src"]
include = ["llama_stack_provider_safety_llama_guard"]
