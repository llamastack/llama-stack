[build-system]
requires = ["setuptools>=61.0", "setuptools-scm>=8.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools_scm]
root = "../.."
fallback_version = "0.7.2.dev0"

[project]
name = "llama_stack"
dynamic = ["version"]
authors = [{ name = "Meta Llama", email = "llama-oss@meta.com" }]
description = "Open-source, OpenAI-compatible API server with pluggable providers for any model and any infrastructure"
readme = "README.md"
requires-python = ">=3.12"
license = { "text" = "MIT" }
classifiers = [
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Operating System :: OS Independent",
    "Intended Audience :: Developers",
    "Intended Audience :: Information Technology",
    "Intended Audience :: Science/Research",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Scientific/Engineering :: Information Analysis",
]
dependencies = [
    "PyYAML>=6.0",
    "aiohttp>=3.13.3",
    "fastapi>=0.115.0,<1.0",                          # server
    "httpx",
    "jinja2>=3.1.6",
    "llama-stack-api",                                # API and provider specifications (local dev via tool.uv.sources)
    "openai>=2.30.0",
    "python-dotenv",
    "pyjwt[crypto]>=2.12.0",                          # Pull crypto to support RS256 for jwt. Requires 2.12.0+ to fix CVE-2026-32597.
    "pydantic>=2.11.9",
    "rich",
    "structlog>=24.1.0",
    "termcolor",
    "h11>=0.16.0",
    "python-multipart>=0.0.22",                       # For fastapi Form
    "uvicorn>=0.34.0",                                # server
    "opentelemetry-sdk>=1.30.0",                      # server
    "opentelemetry-exporter-otlp-proto-http>=1.30.0", # server
    "opentelemetry-distro>=0.60b1",                  # optional CLI instrumentation; only pre-releases on PyPI (latest 0.60b1)
    "aiosqlite>=0.21.0",                              # server - for metadata store
    "asyncpg",                                        # for metadata store
    "sqlalchemy[asyncio]>=2.0.41",                    # server - for conversations
    "starlette>=0.49.1",
    "psycopg2-binary",
    "mcp>=1.23.0",                                    # for connectors
    "zstandard>=0.23.0",                              # server - zstd request decompression
    # TODO: remove these once all providers are extracted into their own packages.
    # During the transition, in-tree provider shims import from these packages.
    "llama-stack-utils-inference",
    "llama-stack-utils-vector-io",
    "llama-stack-utils-safety",
    "llama-stack-utils-bedrock",
    "llama-stack-utils-common",
    # TODO: remove these once all distributions are extracted into their own packages.
    # During the transition, these provider packages are discovered via entry points.
    "llama-stack-provider-inference-sentence-transformers",
    "llama-stack-provider-inference-transformers",
    "llama-stack-provider-inference-anthropic",
    "llama-stack-provider-inference-azure",
    "llama-stack-provider-inference-bedrock",
    "llama-stack-provider-inference-cerebras",
    "llama-stack-provider-inference-databricks",
    "llama-stack-provider-inference-fireworks",
    "llama-stack-provider-inference-gemini",
    "llama-stack-provider-inference-groq",
    "llama-stack-provider-inference-llama-cpp-server",
    "llama-stack-provider-inference-llama-openai-compat",
    "llama-stack-provider-inference-nvidia",
    "llama-stack-provider-inference-oci",
    "llama-stack-provider-inference-openai",
    "llama-stack-provider-inference-passthrough",
    "llama-stack-provider-inference-runpod",
    "llama-stack-provider-inference-sambanova",
    "llama-stack-provider-inference-together",
    "llama-stack-provider-inference-vertexai",
    "llama-stack-provider-inference-vllm",
    "llama-stack-provider-inference-watsonx",
    "llama-stack-provider-safety-prompt-guard",
    "llama-stack-provider-tool-runtime-file-search",
    "llama-stack-provider-vector-io-chromadb",
    "llama-stack-provider-vector-io-chromadb-inline",
    "llama-stack-provider-vector-io-elasticsearch",
    "llama-stack-provider-vector-io-faiss",
    "llama-stack-provider-vector-io-infinispan",
    "llama-stack-provider-vector-io-milvus",
    "llama-stack-provider-vector-io-milvus-inline",
    "llama-stack-provider-vector-io-oci",
    "llama-stack-provider-vector-io-pgvector",
    "llama-stack-provider-vector-io-qdrant",
    "llama-stack-provider-vector-io-qdrant-inline",
    "llama-stack-provider-vector-io-sqlite-vec",
    "llama-stack-provider-vector-io-weaviate",
]

[project.optional-dependencies]
client = [
    "llama-stack-client>=0.7.1", # Optional for library-only usage
]
starter = [
    "aiohttp",
    "aiosqlite",
    "anthropic",
    "asyncpg",
    "autoevals",
    "chardet",
    "chromadb-client",
    "codeshield",
    "datasets>=4.0.0",
    "einops",
    "elasticsearch>=8.16.0,<9.0.0",
    "emoji",
    "faiss-cpu",
    "fastapi",
    "fire",
    "fireworks-ai<=0.17.16",
    "fonttools>=4.60.2",
    "google-genai>=1.69.0",
    "h11>=0.16.0",
    "httpx",
    "langdetect",
    "matplotlib",
    "mcp>=1.23.0",
    "nltk>=3.9.4",
    "numpy",
    "ollama",
    "opentelemetry-exporter-otlp-proto-http",
    "opentelemetry-sdk",
    "pandas",
    "pillow",
    "psycopg2-binary",
    "pymilvus[milvus-lite]>=2.4.10",
    "pymongo",
    "pypdf>=6.7.2",
    "pythainlp",
    "qdrant-client",
    "redis",
    "requests",
    "safetensors",
    "scikit-learn",
    "scipy",
    "sentencepiece",
    "sqlite-vec",
    "together>=2",
    "tokenizers",
    "tqdm",
    "tree_sitter",
    "uvicorn",
    "weaviate-client>=4.16.5",
    "torch",
    "sentence-transformers",
]

[project.urls]
Homepage = "https://github.com/llamastack/llama-stack"

[project.scripts]
llama = "llama_stack.cli.llama:main"
install-wheel-from-presigned = "llama_stack.cli.scripts.run:install_wheel_from_presigned"

[tool.setuptools.packages.find]
where = ["src"]
include = [
    "llama_stack",
    "llama_stack.*",
]
