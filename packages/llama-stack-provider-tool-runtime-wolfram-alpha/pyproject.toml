[project]
name = "llama-stack-provider-tool-runtime-wolfram-alpha"
dynamic = ["version"]
description = "Wolfram Alpha tool for computational knowledge and mathematical calculations."
requires-python = ">=3.12"
license = "MIT"
dependencies = [
    "llama-stack",
    "llama-stack-api",
    "requests",
]

[project.entry-points."llama_stack.providers"]
"tool_runtime.remote.wolfram-alpha" = "llama_stack_provider_tool_runtime_wolfram_alpha.provider:get_provider_spec"

[tool.uv.sources]
llama-stack = { workspace = true }
llama-stack-api = { workspace = true }

[build-system]
requires = ["setuptools>=61.0", "setuptools-scm>=8.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools_scm]
root = "../.."
fallback_version = "0.7.2.dev0"

[tool.setuptools.packages.find]
where = ["src"]
include = ["llama_stack_provider_tool_runtime_wolfram_alpha"]
