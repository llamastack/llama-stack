[project]
name = "efenness-llama-stack-distribution-demo"
version = "0.1.0"
description = "Demo distribution for Llama Stack — ollama inference."
requires-python = ">=3.12"
dependencies = [
    "llama-stack",
    "llama-stack-provider-inference-ollama",
]

[project.entry-points."llama_stack.distributions"]
demo = "llama_stack_distribution_demo:CONFIGS_DIR"

[build-system]
requires = ["setuptools>=75.8.2"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
llama_stack_distribution_demo = ["configs/*.yaml"]
