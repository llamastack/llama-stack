[project]
name = "llama-stack-provider-inference-passthrough"
dynamic = ["version"]
description = "Passthrough inference provider for connecting to any external inference service not directly supported."
requires-python = ">=3.12"
license = "MIT"
dependencies = [
    "llama-stack",
    "llama-stack-api",
    "llama-stack-utils-inference",
    "llama-stack-utils-common",
]

[project.entry-points."llama_stack.providers"]
"inference.remote.passthrough" = "llama_stack_provider_inference_passthrough.provider:get_provider_spec"

[tool.uv.sources]
llama-stack = { workspace = true }
llama-stack-api = { workspace = true }
llama-stack-utils-inference = { workspace = true }
llama-stack-utils-common = { workspace = true }

[build-system]
requires = ["setuptools>=61.0", "setuptools-scm>=8.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools_scm]
root = "../.."
fallback_version = "0.7.2.dev0"

[tool.setuptools.packages.find]
where = ["src"]
include = ["llama_stack_provider_inference_passthrough"]
