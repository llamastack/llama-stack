[build-system]
requires = ["setuptools>=61.0", "setuptools-scm>=8.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools_scm]
root = "../.."
fallback_version = "0.7.1.dev0"

[tool.uv.sources]
llama-stack = { workspace = true }
llama-stack-api = { workspace = true }
llama-stack-utils-inference = { workspace = true }

[project]
name = "llama-stack-provider-inference-cerebras"
dynamic = ["version"]
description = "Cerebras inference provider for running models on Cerebras Cloud platform."
requires-python = ">=3.12"
license = "MIT"
dependencies = [
    "llama-stack",
    "llama-stack-api",
    "llama-stack-utils-inference",
]

[project.entry-points."llama_stack.providers"]
"inference.remote.cerebras" = "llama_stack_provider_inference_cerebras.provider:get_provider_spec"

[tool.setuptools.packages.find]
where = ["src"]
include = ["llama_stack_provider_inference_cerebras"]
