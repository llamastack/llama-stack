[project]
name = "llama-stack-provider-inference-nvidia"
dynamic = ["version"]
description = "NVIDIA inference provider for accessing NVIDIA NIM models and AI services."
requires-python = ">=3.12"
license = "MIT"
dependencies = [
    "llama-stack",
    "llama-stack-api",
    "llama-stack-utils-inference",
]

[project.entry-points."llama_stack.providers"]
"inference.remote.nvidia" = "llama_stack_provider_inference_nvidia.provider:get_provider_spec"

[tool.uv.sources]
llama-stack = { workspace = true }
llama-stack-api = { workspace = true }
llama-stack-utils-inference = { workspace = true }

[build-system]
requires = ["setuptools>=61.0", "setuptools-scm>=8.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools_scm]
root = "../.."
fallback_version = "0.7.2.dev0"

[tool.setuptools.packages.find]
where = ["src"]
include = ["llama_stack_provider_inference_nvidia"]
