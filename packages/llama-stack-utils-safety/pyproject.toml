[project]
name = "llama-stack-utils-safety"
dynamic = ["version"]
description = "Shared safety utilities for Llama Stack providers"
requires-python = ">=3.12"
license = "MIT"
dependencies = [
    "llama-stack-api",
]

[tool.uv.sources]
llama-stack-api = { workspace = true }

[build-system]
requires = ["setuptools>=61.0", "setuptools-scm>=8.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools_scm]
root = "../.."
fallback_version = "0.7.2.dev0"

[tool.setuptools.packages.find]
where = ["src"]
include = ["llama_stack_utils_safety"]
